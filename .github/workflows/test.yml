name: Test

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.17"
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Initialize Pants
        uses: pantsbuild/actions/init-pants@v10
        with:
          gha-cache-key: cache0-py313
          named-caches-hash: ${{ hashFiles('3rdparty/python/default.lock', 'pants.toml') }}
          pants-ci-config: ""

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install just
        uses: extractions/setup-crate@7577c1bdf2d95e6d65d532788f35ed79d4b1dda2 # v2
        with:
          repo: casey/just@1.50.0
          github-token: ${{ github.token }}

      - name: Bootstrap dependencies
        run: just install

      - name: Run tests
        run: just test
