version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # Hold Next.js at 16.1.7 until the upstream regression is resolved.
      # https://github.com/vercel/next.js/issues/91396
      # https://github.com/vercel/next.js/pull/91704
      - dependency-name: "next"
        versions:
          - ">=16.2.0"
      - dependency-name: "@next/third-parties"
        versions:
          - ">=16.2.0"
      # eslint 10 is blocked until eslint-config-next adds support for it.
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@eslint/js"
        update-types:
          - "version-update:semver-major"
    groups:
      npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
